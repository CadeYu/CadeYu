name: Update GitHub Stats Rank Card

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&theme=transparent&title_color=ff2e88&text_color=35f2ff&icon_color=f7ff00&ring_color=ff2e88&border_radius=12
          path: profile/stats.svg
          token: ${{ secrets.SUMMARY_CARD_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update GitHub stats rank card" || exit 0
          git push
